# Configuration Netlify
# Ce fichier permet à Netlify de détecter et déployer l'app automatiquement

[build]
  # Commande de build (ici pas de build frontend, on sert directement public/)
  command = "echo 'Static deploy'"
  publish = "public"

# Redirection des appels API vers le serveur local (pour le dev)
# En production sur Netlify, l'API Express ne tourne pas — Netlify sert uniquement le frontend
# Pour un déploiement complet avec API, utiliser Railway, Render ou votre propre serveur Docker

[[redirects]]
  from = "/api/*"
  to = "http://localhost:3000/api/:splat"
  status = 200

# Headers de sécurité
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
